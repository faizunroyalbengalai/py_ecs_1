  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .project-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      font-size: 2rem;
      box-shadow: 0 4px 20px rgba(31, 111, 235, 0.35);
    }

    .project-name {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e6edf3;
      margin-bottom: 0.6rem;
      line-height: 1.2;
    }

    .project-name span {
      color: #388bfd;
    }

    .subtitle {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 2rem 0;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .info-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b949e;
    }

    .info-value {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.45rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #58a6ff;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0.02em;
    }

    .info-value svg {
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      color: #ffffff;
      box-shadow: 0 2px 12px rgba(31, 111, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(31, 111, 235, 0.45);
    }

    .btn-secondary {
      background: transparent;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #21262d;
      transform: translateY(-2px);
      border-color: #8b949e;
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-number {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      color: #8b949e;
      font-size: 0.85rem;
      padding: 1rem;
      border-top: 1px solid #21262d;
      width: 100%;
      max-width: 680px;
    }

    footer span {
      color: #58a6ff;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .project-name {
        font-size: 1.8rem;
      }

      .info-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
